# =============================================================================
# Contrôle automatique des données de TrouveTaVoie.
#
# Se déclenche à chaque envoi de code (push) et à chaque proposition de
# modification (pull request). Si le validateur trouve une erreur — un code vœu
# en double, un critère qui ne pointe vers rien, un lycée sans trajet — GitHub
# affiche une croix rouge sur le commit et envoie un e-mail.
#
# Le but n'est pas de tester le code, mais les DONNÉES : c'est là que les erreurs
# sont silencieuses, et qu'elles ont des conséquences réelles pour un élève.
#
# Pour lancer le même contrôle sur sa machine :
#     node tools/verifier-donnees.mjs
# =============================================================================

name: Vérification des données

# Le workflow ne fait que lire le dépôt : aucune permission d'écriture.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Permet aussi de le lancer à la main depuis l'onglet « Actions » de GitHub.
  workflow_dispatch:

jobs:
  verifier:
    name: Cohérence des bases de données
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Contrôler la syntaxe de tous les scripts
        run: |

      # no-undef en mode strict attrape les affectations à une variable jamais
      # déclarée (« body = ... » sans let). C'est le bug qui a cassé le 2GT en
      # production : node --check et jsdom (non stricts) ne le voyaient pas, le
      # navigateur oui. ESLint le voit.
      - name: Détecter les variables non déclarées (ESLint no-undef)
        run: npx --yes eslint@9 scripts/
          for f in scripts/*.js scripts/vendor/*.js; do
            node --check "$f" || exit 1
          done
          # Les outils sont des modules ES : --check les accepte via l'extension .mjs
          for f in tools/*.mjs; do
            node --check "$f" || exit 1
          done
          echo "Tous les scripts et outils compilent."

      - name: Vérifier la cohérence des données
        run: node tools/verifier-donnees.mjs

      # 18 coefficients étaient faux (juillet 2026), tous sur le même schéma :
      # la formation portait les coefficients de son DOMAINE au lieu des siens.
      # Un coefficient faux, c'est un élève qui calcule mal ses chances.
      - name: Vérifier les coefficients (fiche technique n°21)
        run: node tools/verifier-coefficients.mjs

      # Le bouton d'aide — celui des élèves les plus perdus — était à 2,54:1
      # sur blanc, pour un seuil AA de 4,5:1. Illisible pour précisément ceux
      # qu'il ne faut pas perdre. Ce contrôle empêche la palette de redériver.
      - name: Vérifier les contrastes (WCAG 2.1 AA)
        run: node tools/verifier-contrastes.mjs

      # Le contrôle qui manquait le 13 juillet 2026 : une fonction supprimée mais
      # encore appelée passait `node --check` sans erreur, et rendait pourtant
      # toute la voie professionnelle inutilisable en production.
      # jsdom simule un vrai navigateur. Les deux tests ci-dessous en dépendent :
      # cette étape doit rester AVANT eux.
      - name: Installer jsdom (simulation du navigateur)
        run: npm install --no-save jsdom

      # Le PDF n'était testé par RIEN : test-parcours.mjs remplace jsPDF par un
      # bouchon. C'est ce trou qui a bloqué la mise à jour de la bibliothèque
      # pendant des mois — impossible de savoir ce qu'une bascule casserait.
      - name: Vérifier la génération du PDF (fiche pro + vœux 2GT)
        run: node tools/test-pdf.mjs

      - name: Tester les parcours utilisateur
        run: node tools/test-parcours.mjs

      # Le README annonçait « 15 familles », « jsPDF 2.5.1 », « distance réelle »,
      # « polices à internaliser », « jamais au clic » — cinq affirmations fausses.
      # Un README faux est pire qu'un README absent : il donne confiance.
      - name: Vérifier que le README dit la vérité
        run: node tools/verifier-readme.mjs
